<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOSIALY - Télécharger l'application</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Arial', 'Souvenir', 'Helvetica', sans-serif;
            font-size: 4.8rem;
            color: #4B0082;
            margin-bottom: 25px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            display: inline-block;
            padding: 12px 35px;
            border: 3px solid #764ba2;
            border-radius: 16px;
            animation: neonPulse 2s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(102, 126, 234, 0.6),
                         0 0 20px rgba(118, 75, 162, 0.4),
                         0 0 40px rgba(118, 75, 162, 0.2);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5),
                        0 0 30px rgba(118, 75, 162, 0.3),
                        0 0 60px rgba(118, 75, 162, 0.15),
                        inset 0 0 12px rgba(102, 126, 234, 0.2),
                        inset 0 0 30px rgba(118, 75, 162, 0.1);
        }

        @keyframes neonPulse {
            0%, 100% {
                border-color: #667eea;
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.5),
                            0 0 30px rgba(118, 75, 162, 0.3),
                            0 0 60px rgba(118, 75, 162, 0.15),
                            inset 0 0 12px rgba(102, 126, 234, 0.2),
                            inset 0 0 30px rgba(118, 75, 162, 0.1);
                text-shadow: 0 0 8px rgba(102, 126, 234, 0.6),
                             0 0 20px rgba(118, 75, 162, 0.4),
                             0 0 40px rgba(118, 75, 162, 0.2);
            }
            50% {
                border-color: #a855f7;
                box-shadow: 0 0 15px rgba(102, 126, 234, 0.7),
                            0 0 45px rgba(118, 75, 162, 0.5),
                            0 0 90px rgba(118, 75, 162, 0.25),
                            inset 0 0 18px rgba(102, 126, 234, 0.3),
                            inset 0 0 45px rgba(118, 75, 162, 0.15);
                text-shadow: 0 0 12px rgba(102, 126, 234, 0.8),
                             0 0 30px rgba(118, 75, 162, 0.6),
                             0 0 60px rgba(118, 75, 162, 0.35);
            }
        }

        .instruction {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .instruction b { font-weight: 700; color: #333; }

        .download-section { margin: 40px 0; }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.35s ease;
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            z-index: 1;
        }

        /* HALO LUMINEUX */
        .download-btn::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            z-index: -1;
            filter: blur(16px);
            transition: opacity 0.4s ease, filter 0.15s ease;
            pointer-events: none;
        }

        .download-btn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.5);
        }

        .download-btn:hover::after {
            opacity: 0.5;
        }

        /* EFFET DE PRESSION + RÉTRÉCISSEMENT VISIBLE */
        .download-btn:active {
            transform: scale(0.82);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.25),
                        0 0 30px rgba(118, 75, 162, 0.35);
            transition: transform 0.08s ease-in,
                        box-shadow 0.08s ease-in;
        }

        .download-btn:active::after {
            opacity: 0.8;
            filter: blur(24px);
        }

        .arrows {
            display: inline-block;
            animation: bounce 1s infinite;
            margin: 0 15px;
            font-weight: bold;
            font-size: 1.8rem;
        }

        .arrows.left { animation-delay: 0s; }
        .arrows.right { animation-delay: 0.5s; }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }

        .app-image {
            display: block;
            margin: 40px auto 0 auto;
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(0,0,0,0.08);
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; letter-spacing: 3px; padding: 8px 20px; }
            .download-btn { font-size: 1.2rem; padding: 15px 30px; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SOSIALY</h1>
        
        <p class="instruction">
            <b>Tsindrio ny &gt;&gt; Télécharger &lt;&lt; hahazoanao ny application SOSIALY.</b>
        </p>

        <div class="download-section">
            <!-- ✅ ID AJOUTÉ ICI POUR LE COMPTEUR -->
            <a href="https://github.com/RD1404/Sosialy/releases/download/V1.0.0/Sosialy.apk" 
               class="download-btn" 
               id="downloadBtn"
               download>
                <span class="arrows left">&gt;&gt;</span>
                Télécharger
                <span class="arrows right">&lt;&lt;</span>
            </a>
        </div>

        <img src="icon-512.png" alt="SOSIALY Application" class="app-image">

        <div class="footer">
            <p>&copy; 2026 SOSIALY - RANDY MIRADO</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('downloadBtn');
            
            // Animation d'entrée
            btn.style.opacity = '0';
            btn.style.transform = 'translateY(20px)';
            setTimeout(() => {
                btn.style.transition = 'all 0.6s ease';
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
</body>
</html>
